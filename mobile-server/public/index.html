<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartOps IA — Adicionar Dados</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #05070B;
  color: #F9FAFB;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  padding: 20px;
  font-size: 14px;
}
.container { max-width: 520px; margin: 0 auto; }

/* Header */
.header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid #1F2937;
}
.dot { width: 10px; height: 10px; border-radius: 50%; background: #7C3AED; box-shadow: 0 0 10px #7C3AED; flex-shrink: 0; }
.header h1 { font-size: 16px; font-weight: 700; }
.header span { font-size: 11px; color: #6B7280; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #0B0F17; border-radius: 10px; padding: 4px; }
.tab {
  flex: 1; padding: 10px; border-radius: 7px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  background: none; color: #6B7280; transition: all 0.15s;
}
.tab.active { background: #7C3AED; color: #fff; }
.tab:hover:not(.active) { color: #F9FAFB; }

/* Card */
.card { background: #0B0F17; border: 1px solid #1F2937; border-radius: 12px; padding: 20px; }

/* Form */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #6B7280; margin-bottom: 5px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 10px 12px;
  background: #111827; border: 1px solid #1F2937; border-radius: 8px;
  color: #F9FAFB; font-size: 13px; outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: #7C3AED; }
.field textarea { resize: vertical; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Buttons */
.btn-save {
  width: 100%; padding: 13px; border-radius: 9px; border: none;
  background: #7C3AED; color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background 0.15s; margin-top: 4px;
}
.btn-save:hover { background: #6d28d9; }
.btn-save:active { transform: scale(0.99); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #10B981; color: #fff; padding: 12px 24px; border-radius: 10px;
  font-weight: 700; font-size: 13px; display: none;
  box-shadow: 0 4px 20px rgba(16,185,129,0.4);
  z-index: 999;
}
.toast.error { background: #EF4444; box-shadow: 0 4px 20px rgba(239,68,68,0.4); }

/* Score helper */
.score-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.score-pill {
  padding: 3px 8px; border-radius: 99px; font-size: 10px; font-weight: 700;
  border: 1px solid; cursor: pointer; transition: all 0.1s;
}
.score-pill:hover { opacity: 0.8; }

/* Status bar */
.status-bar {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: #6B7280;
  margin-top: 16px; padding-top: 14px;
  border-top: 1px solid #1F2937;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #10B981; }
.status-dot.off { background: #EF4444; }

/* Panel hidden by default */
.panel { display: none; }
.panel.active { display: block; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="dot"></div>
    <div>
      <h1>SmartOps IA</h1>
      <span>Entrada rápida de dados</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('lead')">👤 Lead</button>
    <button class="tab" onclick="switchTab('cliente')">🏢 Cliente</button>
    <button class="tab" onclick="switchTab('financeiro')">💰 Financeiro</button>
  </div>

  <!-- ── LEAD ── -->
  <div class="panel active" id="panel-lead">
    <div class="card">
      <div class="field">
        <label>Nome *</label>
        <input id="l-nome" type="text" placeholder="João Silva" autocomplete="off">
      </div>
      <div class="field">
        <label>Empresa *</label>
        <input id="l-empresa" type="text" placeholder="Metalúrgica Silva" autocomplete="off">
      </div>
      <div class="row">
        <div class="field">
          <label>Setor</label>
          <select id="l-setor">
            <option value="manufatura">Manufatura</option>
            <option value="saude">Saúde / Clínica</option>
            <option value="restaurante">Restaurante</option>
            <option value="servicos">Serviços</option>
            <option value="distribuicao">Distribuição</option>
            <option value="tecnologia">Tecnologia</option>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="field">
          <label>Origem</label>
          <select id="l-origem">
            <option value="indicacao">Indicação</option>
            <option value="instagram">Instagram</option>
            <option value="linkedin">LinkedIn</option>
            <option value="google">Google</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="evento">Evento</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>WhatsApp</label>
        <input id="l-whatsapp" type="tel" placeholder="(31) 9xxxx-xxxx">
      </div>
      <div class="field">
        <label>Problema principal *</label>
        <input id="l-problema" type="text" placeholder="Ex: muito retrabalho na linha de produção">
      </div>
      <div class="field">
        <label>Score (0–100) — clique para calcular</label>
        <input id="l-score" type="number" min="0" max="100" placeholder="0">
        <div class="score-pills">
          <span class="score-pill" style="color:#A78BFA;border-color:#7C3AED" onclick="addScore(15)">+15 Dono/CEO</span>
          <span class="score-pill" style="color:#A78BFA;border-color:#7C3AED" onclick="addScore(10)">+10 10-50 func.</span>
          <span class="score-pill" style="color:#A78BFA;border-color:#7C3AED" onclick="addScore(12)">+12 Urgência alta</span>
          <span class="score-pill" style="color:#A78BFA;border-color:#7C3AED" onclick="addScore(15)">+15 Indicação</span>
          <span class="score-pill" style="color:#A78BFA;border-color:#7C3AED" onclick="addScore(8)">+8 Já tentou antes</span>
          <span class="score-pill" style="color:#A78BFA;border-color:#7C3AED" onclick="addScore(8)">+8 Setor prioritário</span>
          <span class="score-pill" style="color:#A78BFA;border-color:#7C3AED" onclick="addScore(10)">+10 Respondeu bem</span>
          <span class="score-pill" style="color:#6B7280;border-color:#374151" onclick="resetScore()">↺ Zerar</span>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Urgência</label>
          <select id="l-urgencia">
            <option value="alta">🔴 Alta</option>
            <option value="media" selected>🟡 Média</option>
            <option value="baixa">🟢 Baixa</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="l-status">
            <option value="novo">Novo</option>
            <option value="lead_quente">🔥 Quente</option>
            <option value="contatado">Contatado</option>
            <option value="reuniao">Reunião marcada</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Observações</label>
        <textarea id="l-notas" rows="2" placeholder="Objeções, contexto, próximo passo..."></textarea>
      </div>
      <button class="btn-save" onclick="saveLead()">➕ Salvar Lead</button>
    </div>
  </div>

  <!-- ── CLIENTE ── -->
  <div class="panel" id="panel-cliente">
    <div class="card">
      <div class="field">
        <label>Nome da empresa *</label>
        <input id="c-nome" type="text" placeholder="Clínica Saúde BH">
      </div>
      <div class="field">
        <label>Nome do contato</label>
        <input id="c-contato" type="text" placeholder="Maria Santos">
      </div>
      <div class="field">
        <label>Tipo de projeto</label>
        <select id="c-projeto">
          <option value="Lean VSM + Quick Wins">Lean VSM + Quick Wins</option>
          <option value="Six Sigma DMAIC">Six Sigma DMAIC</option>
          <option value="Automação n8n">Automação n8n</option>
          <option value="Diagnóstico + Plano">Diagnóstico + Plano</option>
          <option value="Kaizen Event">Kaizen Event</option>
          <option value="Retainer Mensal">Retainer Mensal</option>
        </select>
      </div>
      <div class="row">
        <div class="field">
          <label>Semana atual</label>
          <input id="c-semana" type="number" min="1" max="20" placeholder="1">
        </div>
        <div class="field">
          <label>Ticket (R$)</label>
          <input id="c-ticket" type="number" placeholder="15000">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Data de início</label>
          <input id="c-inicio" type="date">
        </div>
        <div class="field">
          <label>WhatsApp</label>
          <input id="c-whatsapp" type="tel" placeholder="(31) 9xxxx-xxxx">
        </div>
      </div>
      <div class="field">
        <label>Observações</label>
        <textarea id="c-notas" rows="2" placeholder="Última entrega, próximo passo, risco..."></textarea>
      </div>
      <button class="btn-save" onclick="saveClient()">➕ Salvar Cliente</button>
    </div>
  </div>

  <!-- ── FINANCEIRO ── -->
  <div class="panel" id="panel-financeiro">
    <div class="card">
      <div style="font-size:11px;font-weight:700;color:#A78BFA;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px">💜 Receita Mensal</div>
      <div class="row">
        <div class="field">
          <label>Projetos ativos (R$)</label>
          <input id="f-projetos" type="number" placeholder="0">
        </div>
        <div class="field">
          <label>Novos fechamentos (R$)</label>
          <input id="f-fechamentos" type="number" placeholder="0">
        </div>
      </div>
      <div class="field">
        <label>Retainers mensais (R$)</label>
        <input id="f-retainers" type="number" placeholder="0">
      </div>

      <div style="font-size:11px;font-weight:700;color:#6EE7B7;text-transform:uppercase;letter-spacing:0.8px;margin:16px 0 14px">💚 Custos e Pipeline</div>
      <div class="row">
        <div class="field">
          <label>Total custos/mês (R$)</label>
          <input id="f-custos" type="number" placeholder="600">
        </div>
        <div class="field">
          <label>Valor pipeline (R$)</label>
          <input id="f-pipeline" type="number" placeholder="0">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Leads ativos</label>
          <input id="f-leads" type="number" placeholder="0">
        </div>
        <div class="field">
          <label>Reuniões agendadas</label>
          <input id="f-reunioes" type="number" placeholder="0">
        </div>
      </div>
      <button class="btn-save" onclick="saveFinancial()">💾 Salvar Números</button>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Verificando servidor...</span>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;

// ── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'financeiro') loadFinancial();
}

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (ok ? '' : ' error');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

// ── Score pills ───────────────────────────────────────────────────────────────
function addScore(pts) {
  const el = document.getElementById('l-score');
  el.value = Math.min(100, (parseInt(el.value) || 0) + pts);
}
function resetScore() { document.getElementById('l-score').value = 0; }

// ── Save Lead ────────────────────────────────────────────────────────────────
async function saveLead() {
  const nome    = document.getElementById('l-nome').value.trim();
  const empresa = document.getElementById('l-empresa').value.trim();
  const problema = document.getElementById('l-problema').value.trim();
  if (!nome || !empresa || !problema) { toast('Preencha Nome, Empresa e Problema', false); return; }

  const payload = {
    nome, empresa,
    setor:              document.getElementById('l-setor').value,
    origem:             document.getElementById('l-origem').value,
    whatsapp:           document.getElementById('l-whatsapp').value.trim(),
    problema_principal: problema,
    score:              parseInt(document.getElementById('l-score').value) || 0,
    urgencia:           document.getElementById('l-urgencia').value,
    status:             document.getElementById('l-status').value,
    notas:              document.getElementById('l-notas').value.trim(),
    ultimo_contato:     new Date().toISOString().split('T')[0],
  };

  try {
    const r = await fetch(API + '/api/leads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error(await r.text());
    toast(`✅ Lead "${nome}" salvo! Score: ${payload.score}`);
    ['l-nome','l-empresa','l-whatsapp','l-problema','l-notas'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('l-score').value = 0;
  } catch(e) { toast('Erro ao salvar: ' + e.message, false); }
}

// ── Save Client ───────────────────────────────────────────────────────────────
async function saveClient() {
  const nome = document.getElementById('c-nome').value.trim();
  if (!nome) { toast('Preencha o nome da empresa', false); return; }

  const payload = {
    nome,
    contato:     document.getElementById('c-contato').value.trim(),
    projeto:     document.getElementById('c-projeto').value,
    semana:      parseInt(document.getElementById('c-semana').value) || 1,
    ticket:      parseInt(document.getElementById('c-ticket').value) || 0,
    data_inicio: document.getElementById('c-inicio').value || new Date().toISOString().split('T')[0],
    whatsapp:    document.getElementById('c-whatsapp').value.trim(),
    notas:       document.getElementById('c-notas').value.trim(),
    status:      'ativo',
    ultimo_contato: new Date().toISOString().split('T')[0],
  };

  try {
    const r = await fetch(API + '/api/clients', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error(await r.text());
    toast(`✅ Cliente "${nome}" salvo! Ticket: R$ ${payload.ticket.toLocaleString('pt-BR')}`);
    ['c-nome','c-contato','c-whatsapp','c-notas'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('c-semana').value = '';
    document.getElementById('c-ticket').value = '';
  } catch(e) { toast('Erro ao salvar: ' + e.message, false); }
}

// ── Save Financial ────────────────────────────────────────────────────────────
async function saveFinancial() {
  const payload = {
    receita: {
      projetos_ativos:          parseInt(document.getElementById('f-projetos').value)   || 0,
      novos_fechamentos_mes:    parseInt(document.getElementById('f-fechamentos').value) || 0,
      parceria_mensal_retainer: parseInt(document.getElementById('f-retainers').value)   || 0,
      outros: 0,
    },
    custos: {
      total_mensal: parseInt(document.getElementById('f-custos').value) || 600,
    },
    pipeline_vendas: {
      leads_ativos:         parseInt(document.getElementById('f-leads').value)    || 0,
      valor_total_pipeline: parseInt(document.getElementById('f-pipeline').value)  || 0,
      reunioes_agendadas:   parseInt(document.getElementById('f-reunioes').value)  || 0,
    },
  };

  const receita = payload.receita.projetos_ativos + payload.receita.novos_fechamentos_mes + payload.receita.parceria_mensal_retainer;
  const margem  = receita > 0 ? Math.round((receita - payload.custos.total_mensal) / receita * 100) : 0;

  try {
    const r = await fetch(API + '/api/financial', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error(await r.text());
    toast(`✅ Financeiro atualizado! Receita: R$ ${receita.toLocaleString('pt-BR')} | Margem: ${margem}%`);
  } catch(e) { toast('Erro ao salvar: ' + e.message, false); }
}

// ── Load financial into form ──────────────────────────────────────────────────
async function loadFinancial() {
  try {
    const r = await fetch(API + '/api/financial', { signal: AbortSignal.timeout(1500) });
    const d = await r.json();
    if (d.receita) {
      document.getElementById('f-projetos').value    = d.receita.projetos_ativos || '';
      document.getElementById('f-fechamentos').value = d.receita.novos_fechamentos_mes || '';
      document.getElementById('f-retainers').value   = d.receita.parceria_mensal_retainer || '';
    }
    if (d.custos)         document.getElementById('f-custos').value    = d.custos.total_mensal || 600;
    if (d.pipeline_vendas) {
      document.getElementById('f-leads').value    = d.pipeline_vendas.leads_ativos || '';
      document.getElementById('f-pipeline').value  = d.pipeline_vendas.valor_total_pipeline || '';
      document.getElementById('f-reunioes').value  = d.pipeline_vendas.reunioes_agendadas || '';
    }
  } catch {}
}

// ── Server status check ───────────────────────────────────────────────────────
async function checkServer() {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  try {
    await fetch(API + '/api/leads', { signal: AbortSignal.timeout(1500) });
    dot.className  = 'status-dot';
    text.textContent = 'Servidor online — http://localhost:3100';
  } catch {
    dot.className  = 'status-dot off';
    text.textContent = 'Servidor offline — rode: npm run dashboard';
  }
}
checkServer();
setInterval(checkServer, 10000);
</script>
</body>
</html>

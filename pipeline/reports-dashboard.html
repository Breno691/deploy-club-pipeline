<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartOps IA — Relatórios dos Agentes</title>
<style>
  :root {
    --bg:       #0A0A0F;
    --card:     #0F1117;
    --card2:    #13161E;
    --border:   #1F2937;
    --border2:  #2D3748;
    --purple:   #7C3AED;
    --purple2:  #9F67FF;
    --green:    #10B981;
    --red:      #EF4444;
    --yellow:   #F59E0B;
    --blue:     #3B82F6;
    --text:     #F9FAFB;
    --text2:    #9CA3AF;
    --text3:    #6B7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; background: linear-gradient(135deg, var(--purple), var(--green)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-sub { font-size: 13px; color: var(--text2); }
  .date-selector { display: flex; align-items: center; gap: 8px; }
  .date-selector select { background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .date-selector select:focus { outline: none; border-color: var(--purple); }
  .refresh-btn { background: var(--purple); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background .2s; }
  .refresh-btn:hover { background: var(--purple2); }

  /* STATS BAR */
  .stats-bar { display: flex; gap: 12px; padding: 16px 24px; overflow-x: auto; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; min-width: 100px; flex-shrink: 0; }
  .stat-value { font-size: 24px; font-weight: 800; }
  .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
  .stat.ok .stat-value { color: var(--green); }
  .stat.error .stat-value { color: var(--red); }
  .stat.partial .stat-value { color: var(--yellow); }
  .stat.total .stat-value { color: var(--purple2); }

  /* LAYOUT */
  .main { display: flex; gap: 0; height: calc(100vh - 140px); }

  /* SIDEBAR */
  .sidebar { width: 220px; flex-shrink: 0; background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0; }
  .squad-btn { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; font-size: 13px; font-weight: 500; border: none; background: none; color: var(--text2); width: 100%; text-align: left; transition: all .15s; }
  .squad-btn:hover { background: var(--card2); color: var(--text); }
  .squad-btn.active { background: rgba(124,58,237,.15); color: var(--purple2); border-left: 3px solid var(--purple); }
  .squad-btn .count { margin-left: auto; background: var(--border); border-radius: 10px; padding: 2px 7px; font-size: 11px; }
  .squad-btn.active .count { background: var(--purple); color: #fff; }

  /* AGENTS GRID */
  .agents-area { flex: 1; overflow-y: auto; padding: 20px; }
  .squad-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 12px; }
  .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; margin-bottom: 32px; }
  .agent-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all .2s; }
  .agent-card:hover { border-color: var(--purple); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,58,237,.15); }
  .agent-card.selected { border-color: var(--purple2); box-shadow: 0 0 0 2px rgba(124,58,237,.3); }
  .card-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .card-name { font-size: 14px; font-weight: 600; }
  .card-mode { font-size: 11px; color: var(--text3); background: var(--card2); padding: 3px 8px; border-radius: 5px; }
  .card-status { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.error { background: var(--red); }
  .status-dot.partial { background: var(--yellow); }
  .card-body { padding: 12px 16px; }
  .card-preview { font-size: 12px; color: var(--text2); line-height: 1.5; max-height: 60px; overflow: hidden; white-space: pre-wrap; }
  .card-footer { padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); }
  .card-time { font-size: 11px; color: var(--text3); }
  .card-tg { font-size: 11px; color: var(--blue); }
  .card-tasks { font-size: 11px; color: var(--text3); }

  /* DETAIL PANEL */
  .detail-panel { width: 460px; flex-shrink: 0; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  .detail-panel.hidden { display: none; }
  .detail-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .detail-title { font-size: 16px; font-weight: 700; }
  .detail-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; padding: 4px; }
  .detail-close:hover { color: var(--text); }
  .detail-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .detail-tab { padding: 10px 18px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text2); background: none; border-top: none; border-left: none; border-right: none; }
  .detail-tab.active { color: var(--purple2); border-bottom-color: var(--purple); }
  .detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .detail-content { font-size: 13px; line-height: 1.7; color: var(--text2); white-space: pre-wrap; word-break: break-word; }
  .detail-content h1, .detail-content h2, .detail-content h3 { color: var(--text); margin: 14px 0 8px; }
  .detail-content h1 { font-size: 16px; }
  .detail-content h2 { font-size: 14px; color: var(--purple2); }
  .detail-content h3 { font-size: 13px; color: var(--green); }
  .detail-tasks { list-style: none; }
  .detail-tasks li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); display: flex; align-items: flex-start; gap: 8px; }
  .detail-tasks li::before { content: '•'; color: var(--purple2); flex-shrink: 0; margin-top: 1px; }
  .history-item { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .history-date { color: var(--text2); min-width: 100px; }
  .history-status { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 5px; }
  .history-status.ok { background: rgba(16,185,129,.15); color: var(--green); }
  .history-status.error { background: rgba(239,68,68,.15); color: var(--red); }
  .history-status.partial { background: rgba(245,158,11,.15); color: var(--yellow); }
  .history-time { color: var(--text3); margin-left: auto; }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text2); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 60px; color: var(--text3); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* MOBILE */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .detail-panel { width: 100%; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200; }
    .stats-bar { padding: 12px 16px; }
    .agents-area { padding: 12px; }
    .header { padding: 12px 16px; }
    .header-title { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🤖</div>
    <div>
      <div class="header-title">SmartOps IA — Relatórios</div>
      <div class="header-sub" id="header-sub">Carregando...</div>
    </div>
  </div>
  <div class="date-selector">
    <select id="date-select" onchange="loadReports()">
      <option>Carregando...</option>
    </select>
    <button class="refresh-btn" onclick="loadReports()">↻ Atualizar</button>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat total"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Agentes</div></div>
  <div class="stat ok"><div class="stat-value" id="stat-ok">—</div><div class="stat-label">OK</div></div>
  <div class="stat partial"><div class="stat-value" id="stat-partial">—</div><div class="stat-label">Parcial</div></div>
  <div class="stat error"><div class="stat-value" id="stat-error">—</div><div class="stat-label">Erro</div></div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="squad-btn active" data-squad="all" onclick="filterSquad('all', this)">
      🏠 Todos
      <span class="count" id="count-all">0</span>
    </div>
  </div>

  <div class="agents-area" id="agents-area">
    <div class="loading"><div class="spinner"></div> Carregando relatórios...</div>
  </div>

  <div class="detail-panel hidden" id="detail-panel">
    <div class="detail-header">
      <div>
        <div class="detail-title" id="detail-title">—</div>
        <div style="font-size:12px;color:var(--text3)" id="detail-meta">—</div>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-tabs">
      <button class="detail-tab active" onclick="switchTab('report', this)">📄 Relatório</button>
      <button class="detail-tab" onclick="switchTab('tasks', this)">✅ Tarefas</button>
      <button class="detail-tab" onclick="switchTab('history', this)">📅 Histórico</button>
    </div>
    <div class="detail-body">
      <div class="detail-content" id="detail-content">Selecione um agente</div>
    </div>
  </div>
</div>

<script>
const SQUAD_EMOJIS = {
  marketing: '📢', growth: '📈', operations: '⚙️',
  sales: '💼', executive: '🎯', finance: '💰',
  client: '🤝', knowledge: '📚', brand: '👤',
  'ai-lab': '🔬', orchestration: '🎛️'
};

let allReports = [];
let currentSquad = 'all';
let currentReport = null;
let currentTab = 'report';

// ── Carregamento inicial ──────────────────────────────────────────────────────

async function init() {
  try {
    const res  = await fetch('/api/reports/dates');
    const data = await res.json();
    const sel  = document.getElementById('date-select');
    sel.innerHTML = '';

    if (!data.dates || data.dates.length === 0) {
      sel.innerHTML = '<option>Nenhum relatório</option>';
      document.getElementById('agents-area').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>Nenhum relatório ainda.<br>A rotina roda amanhã às 6h BRT.</div></div>';
      return;
    }

    data.dates.forEach((d, i) => {
      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = formatDate(d);
      if (i === 0) opt.selected = true;
      sel.appendChild(opt);
    });

    await loadReports();
  } catch (e) {
    document.getElementById('agents-area').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div>Erro ao conectar: ${e.message}</div></div>`;
  }
}

async function loadReports() {
  const date = document.getElementById('date-select').value;
  if (!date || date === 'Nenhum relatório' || date === 'Carregando...') return;

  document.getElementById('agents-area').innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';

  try {
    const res  = await fetch(`/api/reports?date=${date}`);
    const data = await res.json();
    allReports = data.reports || [];

    updateStats(data.summary);
    buildSidebar(allReports);
    renderAgents(currentSquad);

    document.getElementById('header-sub').textContent = `${allReports.length} agentes · ${formatDate(date)}`;
  } catch (e) {
    document.getElementById('agents-area').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div>Erro: ${e.message}</div></div>`;
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────────

function updateStats(summary) {
  if (!summary) return;
  document.getElementById('stat-total').textContent   = summary.total  || 0;
  document.getElementById('stat-ok').textContent      = summary.ok     || 0;
  document.getElementById('stat-partial').textContent = summary.partial || 0;
  document.getElementById('stat-error').textContent   = summary.errors  || 0;
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

function buildSidebar(reports) {
  const squads = {};
  reports.forEach(r => { squads[r.squad] = (squads[r.squad] || 0) + 1; });

  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `
    <button class="squad-btn ${currentSquad === 'all' ? 'active' : ''}" data-squad="all" onclick="filterSquad('all', this)">
      🏠 Todos <span class="count" id="count-all">${reports.length}</span>
    </button>`;

  Object.entries(squads).sort().forEach(([squad, count]) => {
    const emoji = SQUAD_EMOJIS[squad] || '📦';
    const name  = squad.charAt(0).toUpperCase() + squad.slice(1);
    sidebar.innerHTML += `
      <button class="squad-btn ${currentSquad === squad ? 'active' : ''}" data-squad="${squad}" onclick="filterSquad('${squad}', this)">
        ${emoji} ${name} <span class="count">${count}</span>
      </button>`;
  });
}

function filterSquad(squad, el) {
  currentSquad = squad;
  document.querySelectorAll('.squad-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderAgents(squad);
}

// ── Cards ─────────────────────────────────────────────────────────────────────

function renderAgents(squad) {
  const reports = squad === 'all' ? allReports : allReports.filter(r => r.squad === squad);

  if (reports.length === 0) {
    document.getElementById('agents-area').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>Nenhum agente neste squad.</div></div>';
    return;
  }

  // Agrupa por squad
  const bySquad = {};
  reports.forEach(r => { if (!bySquad[r.squad]) bySquad[r.squad] = []; bySquad[r.squad].push(r); });

  let html = '';
  for (const [s, reps] of Object.entries(bySquad)) {
    const emoji = SQUAD_EMOJIS[s] || '📦';
    html += `<div class="squad-label">${emoji} Squad ${s.toUpperCase()}</div><div class="agents-grid">`;
    reps.forEach(r => { html += buildCard(r); });
    html += '</div>';
  }

  document.getElementById('agents-area').innerHTML = html;
}

function buildCard(r) {
  const statusDot = `<span class="status-dot ${r.status}"></span>`;
  const statusTxt = r.status === 'ok' ? 'OK' : r.status === 'error' ? 'Erro' : 'Parcial';
  const preview   = (r.content_clean || r.content || '').slice(0, 120).replace(/\n/g, ' ');
  const time      = r.elapsed_seconds ? `${r.elapsed_seconds}s` : '—';
  const taskCount = Array.isArray(r.daily_tasks) ? r.daily_tasks.length : 0;

  return `
  <div class="agent-card ${currentReport?.id === r.id ? 'selected' : ''}" onclick="openDetail('${r.id}')">
    <div class="card-header">
      <div>
        <div class="card-name">${r.agent_name}</div>
        <div class="card-mode">--mode ${r.mode || '?'}</div>
      </div>
      <div class="card-status">${statusDot} ${statusTxt}</div>
    </div>
    <div class="card-body">
      <div class="card-preview">${preview || '(sem conteúdo)'}</div>
    </div>
    <div class="card-footer">
      <span class="card-time">⏱ ${time}</span>
      <span class="card-tasks">${taskCount} tarefas</span>
      <span class="card-tg">${r.telegram_sent ? '📱 Enviado' : ''}</span>
    </div>
  </div>`;
}

// ── Detail ────────────────────────────────────────────────────────────────────

async function openDetail(id) {
  const report = allReports.find(r => r.id === id);
  if (!report) return;

  currentReport = report;
  currentTab    = 'report';

  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.agent-card').forEach(c => {
    if (c.getAttribute('onclick').includes(id)) c.classList.add('selected');
  });

  document.getElementById('detail-title').textContent = report.agent_name;
  document.getElementById('detail-meta').textContent  = `${SQUAD_EMOJIS[report.squad] || ''} ${report.squad} · ${formatDate(report.date)} · ${report.elapsed_seconds || 0}s`;
  document.getElementById('detail-panel').classList.remove('hidden');

  document.querySelectorAll('.detail-tab').forEach((t, i) => {
    t.classList.toggle('active', i === 0);
  });

  showTabContent('report', report);
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (currentReport) showTabContent(tab, currentReport);
}

async function showTabContent(tab, report) {
  const body = document.getElementById('detail-content');

  if (tab === 'report') {
    const content = report.content_clean || report.content || '(relatório não disponível)';
    body.innerHTML = renderMarkdown(content);
  }

  else if (tab === 'tasks') {
    const tasks = Array.isArray(report.daily_tasks) ? report.daily_tasks : [];
    if (tasks.length === 0) { body.innerHTML = '<div class="empty" style="padding:20px">Sem tarefas configuradas.</div>'; return; }
    body.innerHTML = `<ul class="detail-tasks">${tasks.map(t => `<li>${t}</li>`).join('')}</ul>`;
  }

  else if (tab === 'history') {
    body.innerHTML = '<div class="loading"><div class="spinner"></div> Carregando histórico...</div>';
    try {
      const res  = await fetch(`/api/reports/history/${report.agent_key}`);
      const data = await res.json();
      if (!data.history || data.history.length === 0) {
        body.innerHTML = '<div class="empty" style="padding:20px">Sem histórico disponível.</div>';
        return;
      }
      body.innerHTML = data.history.map(h => `
        <div class="history-item" onclick="loadDateAndOpen('${h.date}', '${report.agent_key}')" style="cursor:pointer">
          <span class="history-date">${formatDate(h.date)}</span>
          <span class="history-status ${h.status}">${h.status}</span>
          <span class="history-time">${h.elapsed_seconds || 0}s</span>
        </div>`).join('');
    } catch (e) {
      body.innerHTML = `<div class="empty" style="padding:20px">Erro: ${e.message}</div>`;
    }
  }
}

function closeDetail() {
  document.getElementById('detail-panel').classList.add('hidden');
  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('selected'));
  currentReport = null;
}

// ── Markdown simples ─────────────────────────────────────────────────────────

function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text)">$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:var(--card2);padding:2px 6px;border-radius:4px;font-size:12px">$1</code>')
    .replace(/^\| (.+) \|$/gm, '<div style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);color:var(--text2)">$1</div>')
    .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:12px 0">')
    .replace(/^[-•] (.+)$/gm, '<div style="padding:3px 0 3px 12px;color:var(--text2)">• $1</div>')
    .replace(/\n/g, '<br>');
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function formatDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${day}/${months[parseInt(m)-1]}/${y}`;
}

async function loadDateAndOpen(date, agentKey) {
  document.getElementById('date-select').value = date;
  await loadReports();
  const report = allReports.find(r => r.agent_key === agentKey);
  if (report) openDetail(report.id);
}

// ── Init ──────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>

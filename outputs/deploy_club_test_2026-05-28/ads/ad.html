<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deploy Club – Lean Six Sigma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
  }

  .ad-container {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #06060e;
    position: relative;
  }

  .grain-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 100;
    opacity: 0.05;
  }

  /* Left column copy area */
  .left-panel {
    position: absolute;
    top: 0;
    left: 0;
    width: 560px;
    height: 1080px;
    z-index: 10;
  }

  /* Right panel visual */
  .right-panel {
    position: absolute;
    top: 0;
    left: 560px;
    width: 520px;
    height: 1080px;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Background glow effects */
  .bg-glow-left {
    position: absolute;
    top: 200px;
    left: -100px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  .bg-glow-right {
    position: absolute;
    top: 300px;
    right: -80px;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  /* Vertical separator line */
  .panel-separator {
    position: absolute;
    top: 60px;
    left: 560px;
    width: 1px;
    height: 960px;
    background: linear-gradient(to bottom, transparent, rgba(124, 58, 237, 0.25) 20%, rgba(124, 58, 237, 0.25) 80%, transparent);
    z-index: 6;
  }

  /* Label / pill */
  .label-pill {
    position: absolute;
    top: 80px;
    left: 80px;
    background: rgba(124, 58, 237, 0.15);
    border: 1px solid rgba(124, 58, 237, 0.4);
    border-radius: 999px;
    padding: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #a78bfa;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    z-index: 10;
  }

  /* Headline */
  .headline {
    position: absolute;
    top: 160px;
    left: 80px;
    width: 480px;
    font-family: 'DM Sans', sans-serif;
    font-size: 52px;
    font-weight: 800;
    color: #e8e8f0;
    line-height: 1.2;
    z-index: 10;
    letter-spacing: -0.02em;
  }

  .headline span.accent {
    color: #a78bfa;
  }

  /* Subtext */
  .subtext {
    position: absolute;
    top: 380px;
    left: 80px;
    width: 460px;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: #8b8baa;
    line-height: 1.4;
    z-index: 10;
  }

  /* Divider */
  .divider {
    position: absolute;
    top: 520px;
    left: 80px;
    width: 100px;
    height: 2px;
    background: #7c3aed;
    z-index: 10;
    border-radius: 1px;
  }

  /* Metric rows */
  .metric {
    position: absolute;
    left: 80px;
    z-index: 10;
  }

  .metric .metric-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: rgba(167, 139, 250, 0.5);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
  }

  .metric .metric-value {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #a78bfa;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .metric .metric-value::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #7c3aed;
    flex-shrink: 0;
  }

  .metric-1 { top: 560px; }
  .metric-2 { top: 640px; }
  .metric-3 { top: 720px; }

  /* CTA Button */
  .cta-button {
    position: absolute;
    top: 880px;
    left: 80px;
    width: 460px;
    height: 64px;
    background: #25d366;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    box-shadow: 0 0 32px rgba(37, 211, 102, 0.25), 0 4px 16px rgba(37, 211, 102, 0.2);
  }

  .cta-button .cta-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  .cta-button .cta-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.01em;
  }

  /* Footer contact */
  .contact-text {
    position: absolute;
    top: 968px;
    left: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: #8b8baa;
    z-index: 10;
    letter-spacing: 0.04em;
  }

  /* Right panel: terminal card */
  .terminal-card {
    width: 400px;
    background: rgba(15, 15, 30, 0.9);
    border: 1px solid rgba(124, 58, 237, 0.2);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(124, 58, 237, 0.1), 0 0 120px rgba(124, 58, 237, 0.05), inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative;
    z-index: 10;
  }

  .terminal-titlebar {
    background: rgba(20, 20, 40, 0.95);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(124, 58, 237, 0.15);
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .dot-red   { background: #ff5f57; }
  .dot-amber { background: #febc2e; }
  .dot-green { background: #28c840; }

  .terminal-title-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: rgba(167, 139, 250, 0.5);
    margin-left: 4px;
    letter-spacing: 0.06em;
  }

  .terminal-body {
    padding: 24px 20px 28px;
  }

  .t-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.8;
    white-space: nowrap;
  }

  .t-prompt { color: rgba(124, 58, 237, 0.7); }
  .t-cmd    { color: #a78bfa; }
  .t-ok     { color: #25d366; }
  .t-warn   { color: #febc2e; }
  .t-muted  { color: rgba(139, 139, 170, 0.5); }
  .t-val    { color: #e8e8f0; }
  .t-key    { color: #a78bfa; }

  /* Sigma badge on terminal */
  .sigma-badge {
    position: absolute;
    top: -18px;
    right: 20px;
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    border-radius: 10px;
    padding: 10px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
    white-space: nowrap;
  }

  /* Metrics mini cards below terminal */
  .mini-stats {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    width: 400px;
  }

  .mini-stat {
    flex: 1;
    background: rgba(15, 15, 30, 0.9);
    border: 1px solid rgba(124, 58, 237, 0.15);
    border-radius: 10px;
    padding: 14px 12px;
    text-align: center;
  }

  .mini-stat-value {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #a78bfa;
    line-height: 1;
    margin-bottom: 5px;
  }

  .mini-stat-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: #8b8baa;
    line-height: 1.3;
  }

  /* Process flow diagram in card */
  .process-flow {
    display: flex;
    align-items: center;
    gap: 0;
    margin: 18px 0 6px;
    padding: 12px 14px;
    background: rgba(124, 58, 237, 0.05);
    border: 1px solid rgba(124, 58, 237, 0.1);
    border-radius: 8px;
  }

  .flow-step {
    flex: 1;
    text-align: center;
  }

  .flow-step-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    color: rgba(167, 139, 250, 0.6);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }

  .flow-step-tag {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #a78bfa;
  }

  .flow-arrow {
    font-size: 14px;
    color: rgba(124, 58, 237, 0.4);
    padding: 0 2px;
    flex-shrink: 0;
  }

  /* Brand logo area */
  .brand-logo {
    position: absolute;
    top: 80px;
    right: 80px;
    z-index: 10;
    text-align: right;
  }

  .brand-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: rgba(167, 139, 250, 0.4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .brand-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #7c3aed;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* Bottom border accent */
  .bottom-accent {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(to right, transparent, #7c3aed 30%, #a78bfa 50%, #7c3aed 70%, transparent);
    z-index: 10;
  }

  /* Top border accent */
  .top-accent {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(to right, transparent, rgba(124, 58, 237, 0.3) 30%, rgba(167, 139, 250, 0.3) 50%, rgba(124, 58, 237, 0.3) 70%, transparent);
    z-index: 10;
  }

  /* Decorative corner marks */
  .corner-mark {
    position: absolute;
    width: 20px;
    height: 20px;
    z-index:

name: Deploy to EasyPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy smartops-dashboard
        run: |
          curl -s -X POST \
            "http://${{ secrets.EASYPANEL_HOST }}/api/trpc/services.redeploy" \
            -u "${{ secrets.EASYPANEL_EMAIL }}:${{ secrets.EASYPANEL_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d '{"json":{"projectName":"n8n","serviceName":"smartops-dashboard"}}'

      - name: Deploy smartops-dados
        run: |
          curl -s -X POST \
            "http://${{ secrets.EASYPANEL_HOST }}/api/trpc/services.redeploy" \
            -u "${{ secrets.EASYPANEL_EMAIL }}:${{ secrets.EASYPANEL_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d '{"json":{"projectName":"n8n","serviceName":"smartops-dados"}}'
